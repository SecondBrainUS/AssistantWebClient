server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — Vue Router handles all deep links
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Readiness/liveness probe target
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
